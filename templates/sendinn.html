<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="logo">
        <a href="/">
            <img src="../static/images/Nailicous.svg" alt="Nailicous with a cursive font and a strawberry stem on the u">
        </a>
    </div>

    <div class="subtitle">
        <h1>Send inn et spørsmål</h1>
    </div>

    <div class="login">
        <form method="POST">
            Navn:<br>
            <input type="text" name="navn"><br><br>

            Email:<br>
            <input type="email" name="email"><br><br>

            Spørsmål:<br>
            <input type="text" name="sporsmal" required><br><br>

            <button type="submit">Send</button>
        </form>

        <p><a href="/faq">Tilbake til FAQ</a></p>
    </div>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <ul>
                {% for message in messages %}
                    <li>{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}
    {% endwith %}


</body>
</html>
